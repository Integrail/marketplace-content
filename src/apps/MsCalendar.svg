<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#0078D4"/>
  <!-- Calendar body -->
  <rect x="16" y="30" width="68" height="56" rx="5" fill="white"/>
  <!-- Calendar header bar -->
  <rect x="16" y="30" width="68" height="22" rx="5" fill="#0078D4"/>
  <rect x="16" y="44" width="68" height="8" fill="#0078D4"/>
  <!-- Calendar pins -->
