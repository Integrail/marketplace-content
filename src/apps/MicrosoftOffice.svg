<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#D83B01"/>
  <!-- Word - blue -->
  <rect x="14" y="14" width="30" height="30" rx="5" fill="#2B579A"/>
  <text x="29" y="36" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="white">W</text>
  <!-- Excel - green -->
  <rect x="56" y="14" width="30" height="30" rx="5" fill="#217346"/>
  <text x="71" y="36" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="white">X</text>
  <!-- PowerPoint - red -->
  <rect x="14" y="56" width="30" height="30" rx="5" fill="#C43E1C"/>
  <text x="29" y="78" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="white">P</text>
  <!-- Outlook - blue -->
  <rect x="56" y="56" width="30" height="30" rx="5" fill="#0072C6"/>
  <text x="71" y="78" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="white">O</text>
</svg>
